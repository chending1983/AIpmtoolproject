<script>
/**
 * Footer Component Logic
 * 底部组件的交互逻辑
 */
(function() {
    'use strict';
    
    class FooterComponent {
        constructor(container) {
            this.container = container;
            this.footer = null;
            this.showSocial = true;
            
            this.init();
        }
        
        init() {
            this.render();
            this.bindEvents();
            this.updateYear();
        }
        
        render() {
            const template = document.getElementById('footer-template');
            if (!template) return;
            
            const content = template.content.cloneNode(true);
            this.container.appendChild(content);
            this.footer = this.container.querySelector('#main-footer');
            
            // 读取配置
            this.showSocial = this.container.dataset.showSocial !== 'false';
            const customClass = this.container.dataset.customClass;
            
            // 应用自定义类
            if (customClass && this.footer) {
                this.footer.classList.add(customClass);
            }
            
            // 控制社交媒体显示
            if (!this.showSocial) {
                const socialSection = this.container.querySelector('[data-social-section]');
                if (socialSection) socialSection.style.display = 'none';
            }
        }
        
        bindEvents() {
            // 链接点击事件
            this.container.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', (e) => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('#')) {
                        this.emit('linkClick', { 
                            href: href,
                            text: link.textContent.trim()
                        });
                    }
                });
            });
            
            // 社交媒体链接点击
            this.container.querySelectorAll('.social-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const platform = link.getAttribute('aria-label');
                    this.emit('socialClick', { platform });
                });
            });
        }
        
        updateYear() {
            const yearSpan = this.container.querySelector('#current-year');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        }
        
        emit(eventName, data) {
            const event = new CustomEvent(`footer:${eventName}`, {
                detail: data,
                bubbles: true
            });
            this.container.dispatchEvent(event);
        }
        
        // 公共API
        setSocialVisible(visible) {
            const socialSection = this.container.querySelector('[data-social-section]');
            if (socialSection) {
                socialSection.style.display = visible ? 'flex' : 'none';
            }
        }
        
        updateCopyright(year, company) {
            const yearSpan = this.container.querySelector('#current-year');
            const companySpan = this.container.querySelector('[data-i18n="footer.companyName"]');
            
            if (yearSpan) yearSpan.textContent = year;
            if (companySpan && company) companySpan.textContent = company;
        }
    }
    
    window.FooterComponent = FooterComponent;
})();
</script>
