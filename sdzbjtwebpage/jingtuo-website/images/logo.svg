<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- 背景圆角矩形 -->
  <rect width="200" height="60" rx="8" fill="url(#gradient)"/>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crystalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 晶体图形标志 -->
  <g transform="translate(15, 10)">
    <!-- 六边形晶体轮廓 -->
    <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="url(#crystalGradient)" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <!-- 内部晶体线条 -->
    <line x1="20" y1="2" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="4" y1="11" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="36" y1="11" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="4" y1="29" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="36" y1="29" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="38" x2="20" y2="20" stroke="white" stroke-width="1" opacity="0.6"/>
    <!-- 中心亮点 -->
    <circle cx="20" cy="20" r="3" fill="white" opacity="0.8"/>
  </g>

  <!-- 中文名称：晶拓 -->
  <text x="65" y="28" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="20" font-weight="700" fill="white">晶拓</text>

  <!-- 英文副标题 -->
  <text x="65" y="48" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">JINGTUO MATERIALS</text>

  <!-- 右侧装饰线条 -->
  <line x1="175" y1="15" x2="175" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <circle cx="175" cy="30" r="2" fill="rgba(255,255,255,0.5)"/>
</svg>